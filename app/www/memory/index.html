<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="format-detection" content="telephone=no">
    <meta name="msapplication-tap-highlight" content="no">
    <meta name="color-scheme" content="light dark">
    <meta name="viewport" content="user-scalable=no, initial-scale=1, maximum-scale=1, minimum-scale=1, width=device-width, height=device-height, target-densitydpi=device-dpi" />
    <link rel="stylesheet" href="../css/memory.css" type="text/css" media="screen">
    <title>SproutPlay - Memory!</title>
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="memory-header">
            <button id="memory-back" class="back-button" aria-label="Back to hub">
                ← Back
            </button>
            <h1 class="memory-title">Memory</h1>
        </header>

        <!-- Game Stats -->
        <div class="stats-bar">
            <div class="stat">
                <span class="stat-label">Moves</span>
                <span id="move-count" class="stat-value">0</span>
            </div>
            <div class="stat">
                <span class="stat-label">Pairs</span>
                <span id="pair-count" class="stat-value">0/6</span>
            </div>
            <button id="restart-btn" class="restart-button">🔄</button>
        </div>

        <!-- Game Board -->
        <div id="game-board" class="game-board">
            <!-- Cards injected by JS -->
        </div>

        <!-- Celebration Overlay -->
        <div id="celebration" class="celebration-overlay" style="display:none">
            <div class="celebration-card">
                <div class="celebration-emoji">🎉</div>
                <h2>You Did It!</h2>
                <p>All pairs found in <span id="final-moves">0</span> moves!</p>
                <div class="celebration-stars">
                    <span>⭐</span><span>⭐</span><span>⭐</span>
                </div>
                <button id="play-again-btn" class="play-again-button">Play Again 🎮</button>
                <button id="celebration-back" class="play-again-button secondary">Back to Hub</button>
            </div>
        </div>
    </div>

    <script src="../js/sound.js"></script>
    <script src="../js/memory/memory.js"></script>
</body>
</html>
